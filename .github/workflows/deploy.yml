name: Deploy infra → Hetzner VM

# Applies infrastructure changes (docker-compose + Caddyfile) to the VM whenever
# they change on main. Does NOT rebuild app images — backend/pipeline images are
# built & deployed by their own repos. This only refreshes the compose stack and
# reloads Caddy, so new services (jupyterlab, sandbox) come up and routing
# changes apply without a manual VM step.
#
# Requires repo secrets: SSH_HOST, SSH_KEY (same values the backend repo uses).

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Apply compose + reload Caddy on the VM
    runs-on: ubuntu-latest
    steps:
      - name: SSH and apply infra
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN,CODE_SERVER_PASSWORD
          script: |
            set -e
            # Refresh GHCR credentials (stale creds otherwise cause "denied" even on
            # public images). Needed to pull the sandbox image.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u zmz-commits --password-stdin
            # Ensure the deploy user owns the repo (it may have been cloned as root),
            # otherwise git pull can't write .git. deploy has passwordless sudo.
            sudo chown -R deploy:deploy /opt/trading-platform 2>/dev/null || true
            git config --global --add safe.directory /opt/trading-platform 2>/dev/null || true
            cd /opt/trading-platform
            git pull --ff-only
            cd deploy
            # Pull only the sandbox image (built+pushed to GHCR) so its same :prod tag
            # actually updates. Other images are built locally on the VM (pipeline) or
            # managed by their own repos, so we don't --pull everything.
            docker compose pull sandbox || true
            # Build the custom code-server image (code-server + Claude Code CLI).
            # `up` alone won't rebuild after a Dockerfile change, so build explicitly.
            docker compose build code-server
            docker compose up -d --remove-orphans
            # Ensure the IDE workspace structure exists and is writable. The
            # workspace volume mounts at /home/coder/project as root-owned, so
            # the coder user can't create files there until we fix it. Seed the
            # strategies/ and indicators/ folders too.
            docker exec -u root code-server sh -c 'mkdir -p /home/coder/project/strategies /home/coder/project/indicators && chown -R coder:coder /home/coder/project' || true
            # Apply Caddyfile changes. The Caddyfile is bind-mounted as a single FILE,
            # and `git pull` replaces it by writing a new file + rename (new inode).
            # A single-file bind mount stays pinned to the ORIGINAL inode, so neither
            # `caddy reload` nor `docker compose restart caddy` (same container = same
            # stale mount) ever sees the updated file. Only RECREATING the container
            # re-resolves the bind mount to the current host file. Brief blip, but it's
            # the only thing that actually applies Caddyfile changes.
            docker compose up -d --force-recreate caddy
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # code-server password (so its public endpoint is protected); set via:
          #   gh secret set CODE_SERVER_PASSWORD --repo ZMZ-commits/trading-strategy-platform
          CODE_SERVER_PASSWORD: ${{ secrets.CODE_SERVER_PASSWORD }}
