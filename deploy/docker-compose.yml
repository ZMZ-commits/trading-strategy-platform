# Runs on the Hetzner VM.
# 3 backends + Caddy + Redis + live data pipeline.
# (The UI is served by Cloudflare Pages, not this VM.)
#
# Live data: ONE pipeline holds the single Alpaca data-stream connection
# (free tier allows one) and publishes ticks to Redis. All 3 backends
# subscribe to the same Redis and fan out to browsers over WebSocket.
#
# Alpaca keys come from deploy/.env (NOT committed):
#   ALPACA_API_KEY=...
#   ALPACA_SECRET_KEY=...

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - web

  pipeline:
    image: ghcr.io/zmz-commits/trading-strategy-data-pipeline:latest
    container_name: pipeline
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY:-}
      - ALPACA_FEED=${ALPACA_FEED:-iex}
      - SYMBOLS=${SYMBOLS:-AAPL,TSLA,NVDA,MSFT,AMZN,GOOGL,META,SPY}
    depends_on:
      - redis
    networks:
      - web

  backend-prod:
    image: ghcr.io/zmz-commits/trading-strategy-backend:prod
    container_name: backend-prod
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
      - IDE_WORKSPACE=/workspace
    volumes:
      - /data/prod:/data/trading-strategies
      - workspace:/workspace   # shared code-server workspace (scaffold strategies/indicators)
    depends_on:
      - redis
    networks:
      - web

  backend-stg:
    image: ghcr.io/zmz-commits/trading-strategy-backend:stg
    container_name: backend-stg
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading-stg.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
      - IDE_WORKSPACE=/workspace
    volumes:
      - /data/stg:/data/trading-strategies
      - workspace:/workspace   # shared code-server workspace (scaffold strategies/indicators)
    depends_on:
      - redis
    networks:
      - web

  backend-dev:
    image: ghcr.io/zmz-commits/trading-strategy-backend:dev
    container_name: backend-dev
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading-dev.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
      - IDE_WORKSPACE=/workspace
    volumes:
      - /data/dev:/data/trading-strategies
      - workspace:/workspace   # shared code-server workspace (scaffold strategies/indicators)
    depends_on:
      - redis
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - backend-prod
      - backend-stg
      - backend-dev

  # ── Web IDE (code-server — VS Code in the browser) ───────────────
  # Owner-only full IDE for authoring strategies/indicators, plus the Claude Code
  # CLI as an in-terminal AI agent (run `claude`, then `/login`). Built from
  # Dockerfile.codeserver. Published publicly at https://ide.zemingzhang.com via
  # Caddy (host port stays bound to localhost); guarded by CODE_SERVER_PASSWORD.
  # Set the password in deploy/.env (NOT committed):  CODE_SERVER_PASSWORD=...
  code-server:
    build:
      context: .
      dockerfile: Dockerfile.codeserver
    image: trading-code-server:latest   # locally-built tag (see Dockerfile.codeserver)
    container_name: code-server
    restart: unless-stopped
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:-}
      # publish() (run from the IDE terminal) writes here; the sandbox reads the
      # same path read-only to run published indicators.
      - TSP_REGISTRY=/home/coder/project/registry
    ports:
      - "127.0.0.1:8080:8080"   # localhost-only on the host; public via Caddy
    volumes:
      # Persist the whole home dir so VS Code settings/extensions AND the Claude
      # Code login survive container recreates (deploys recreate this container).
      - coder_home:/home/coder
      - workspace:/home/coder/project   # your project + registry; NO prod data mounted
    mem_limit: 2g
    cpus: "1.5"
    networks:
      - web

  # ── Sandbox (published-indicator execution) ──────────────────────
  # Runs published compute(ctx) on demand, invoked by the backend (POST :9000/run).
  # Reads the registry JupyterLab writes (read-only). TODO harden further:
  # no network egress, ephemeral-per-run (or gVisor/Firecracker), dep allowlist.
  sandbox:
    image: ghcr.io/zmz-commits/trading-strategy-sandbox:prod
    container_name: sandbox
    restart: unless-stopped
    environment:
      - TSP_REGISTRY=/work/registry    # matches code-server's /home/coder/project/registry
    volumes:
      - workspace:/work:ro             # shared registry (read-only)
    command: ["uvicorn", "tsp.worker:create_app", "--factory", "--host", "0.0.0.0", "--port", "9000"]
    mem_limit: 1g
    cpus: "1.0"
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  workspace:
  coder_home:   # code-server home: settings, extensions, Claude Code login
