# Runs on the Hetzner VM.
# 3 backends + Caddy + Redis + live data pipeline.
# (The UI is served by Cloudflare Pages, not this VM.)
#
# Live data: ONE pipeline holds the single Alpaca data-stream connection
# (free tier allows one) and publishes ticks to Redis. All 3 backends
# subscribe to the same Redis and fan out to browsers over WebSocket.
#
# Alpaca keys come from deploy/.env (NOT committed):
#   ALPACA_API_KEY=...
#   ALPACA_SECRET_KEY=...

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - web

  pipeline:
    image: ghcr.io/zmz-commits/trading-strategy-data-pipeline:latest
    container_name: pipeline
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY:-}
      - ALPACA_FEED=${ALPACA_FEED:-iex}
      - SYMBOLS=${SYMBOLS:-AAPL,TSLA,NVDA,MSFT,AMZN,GOOGL,META,SPY}
    depends_on:
      - redis
    networks:
      - web

  backend-prod:
    image: ghcr.io/zmz-commits/trading-strategy-backend:prod
    container_name: backend-prod
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
    volumes:
      - /data/prod:/data/trading-strategies
    depends_on:
      - redis
    networks:
      - web

  backend-stg:
    image: ghcr.io/zmz-commits/trading-strategy-backend:stg
    container_name: backend-stg
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading-stg.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
    volumes:
      - /data/stg:/data/trading-strategies
    depends_on:
      - redis
    networks:
      - web

  backend-dev:
    image: ghcr.io/zmz-commits/trading-strategy-backend:dev
    container_name: backend-dev
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading-dev.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
    volumes:
      - /data/dev:/data/trading-strategies
    depends_on:
      - redis
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - backend-prod
      - backend-stg
      - backend-dev

  # ── Indicator authoring (JupyterLab) ─────────────────────────────
  # Owner-only Python environment for prototyping custom indicators.
  # SECURITY: JupyterLab is arbitrary code execution. By default it is bound to
  # localhost on the VM (NOT internet-exposed) — reach it via an SSH tunnel:
  #   ssh -L 8888:127.0.0.1:8888 deploy@<vm-ip>   then open http://localhost:8888
  # Set a token in deploy/.env (NOT committed):  JUPYTER_TOKEN=...
  # To expose it publicly instead, see the commented lab.* block in Caddyfile.
  jupyterlab:
    image: jupyter/scipy-notebook:latest
    container_name: jupyterlab
    restart: unless-stopped
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-}
    ports:
      - "127.0.0.1:8888:8888"   # localhost-only; tunnel in via SSH
    volumes:
      - jupyter_work:/home/jovyan/work   # notebooks persist here; NO prod data mounted
    mem_limit: 2g
    cpus: "1.5"
    networks:
      - web

  # ── Sandbox (published-indicator execution) ──────────────────────
  # PLACEHOLDER for Phase 1b: runs published compute(ctx) on demand, invoked by
  # the backend. No worker code yet — it idles. When wired, harden further:
  # no network egress, ephemeral-per-run (or gVisor/Firecracker), dep allowlist.
  sandbox:
    image: python:3.11-slim
    container_name: sandbox
    restart: unless-stopped
    command: ["sleep", "infinity"]   # idle until the execution worker is added
    mem_limit: 1g
    cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  jupyter_work:
