# Runs on the Hetzner VM.
# 3 backends + Caddy + Redis + live data pipeline.
# (The UI is served by Cloudflare Pages, not this VM.)
#
# Live data: ONE pipeline holds the single Alpaca data-stream connection
# (free tier allows one) and publishes ticks to Redis. All 3 backends
# subscribe to the same Redis and fan out to browsers over WebSocket.
#
# Alpaca keys come from deploy/.env (NOT committed):
#   ALPACA_API_KEY=...
#   ALPACA_SECRET_KEY=...

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - web

  pipeline:
    image: ghcr.io/zmz-commits/trading-strategy-data-pipeline:latest
    container_name: pipeline
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY:-}
      - ALPACA_FEED=${ALPACA_FEED:-iex}
      - SYMBOLS=${SYMBOLS:-AAPL,TSLA,NVDA,MSFT,AMZN,GOOGL,META,SPY}
    depends_on:
      - redis
    networks:
      - web

  backend-prod:
    image: ghcr.io/zmz-commits/trading-strategy-backend:prod
    container_name: backend-prod
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
    volumes:
      - /data/prod:/data/trading-strategies
    depends_on:
      - redis
    networks:
      - web

  backend-stg:
    image: ghcr.io/zmz-commits/trading-strategy-backend:stg
    container_name: backend-stg
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading-stg.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
    volumes:
      - /data/stg:/data/trading-strategies
    depends_on:
      - redis
    networks:
      - web

  backend-dev:
    image: ghcr.io/zmz-commits/trading-strategy-backend:dev
    container_name: backend-dev
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading-dev.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
      - REDIS_URL=redis://redis:6379
    volumes:
      - /data/dev:/data/trading-strategies
    depends_on:
      - redis
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - backend-prod
      - backend-stg
      - backend-dev

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
