# Runs on the Hetzner VM.
# All 3 backend environments + 3 frontend environments + Caddy reverse proxy.
# Images are built on the server (or pulled from ghcr.io when CI is wired up).

services:
  backend-prod:
    image: ghcr.io/zmz-commits/trading-strategy-backend:prod
    container_name: backend-prod
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
    volumes:
      - /data/prod:/data/trading-strategies
    networks:
      - web

  backend-stg:
    image: ghcr.io/zmz-commits/trading-strategy-backend:stg
    container_name: backend-stg
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading-stg.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
    volumes:
      - /data/stg:/data/trading-strategies
    networks:
      - web

  backend-dev:
    image: ghcr.io/zmz-commits/trading-strategy-backend:dev
    container_name: backend-dev
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=https://trading-dev.zemingzhang.com
      - STORE_ROOT=/data/trading-strategies
    volumes:
      - /data/dev:/data/trading-strategies
    networks:
      - web

  frontend-prod:
    image: ghcr.io/zmz-commits/trading-strategy-ui:prod
    container_name: frontend-prod
    restart: unless-stopped
    networks:
      - web

  frontend-stg:
    image: ghcr.io/zmz-commits/trading-strategy-ui:stg
    container_name: frontend-stg
    restart: unless-stopped
    networks:
      - web

  frontend-dev:
    image: ghcr.io/zmz-commits/trading-strategy-ui:dev
    container_name: frontend-dev
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - backend-prod
      - backend-stg
      - backend-dev
      - frontend-prod
      - frontend-stg
      - frontend-dev

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
